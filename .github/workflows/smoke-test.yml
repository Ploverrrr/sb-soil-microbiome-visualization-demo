name: Lightweight smoke test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install smoke-test R packages
        run: |
          Rscript -e 'install.packages(c("ggplot2", "patchwork", "randomForest", "igraph", "ggtern"), dependencies = c("Depends", "Imports", "LinkingTo"))'

      - name: Run lightweight smoke test
        run: Rscript scripts/run_smoke_test.R
