name: Run R demo modules

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  run-demos:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: no

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libglpk-dev \
            libgsl-dev

      - name: Install R package dependencies
        run: Rscript scripts/install_r_dependencies.R

      - name: Regenerate shared toy data
        run: Rscript scripts/create_shared_toy_data.R

      - name: Run all demo modules
        run: Rscript scripts/run_all_demos.R

      - name: Upload generated demo outputs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: demo-outputs
          path: |
            data/toy_shared/*.csv
            [0-9][0-9]_*/results/*.csv
            [0-9][0-9]_*/figures/*.pdf
            [0-9][0-9]_*/figures/*.png
          if-no-files-found: warn
          retention-days: 14
